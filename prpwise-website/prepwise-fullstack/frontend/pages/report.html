<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PrepWise — Interview Report</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--red:#E03A0A;--red2:#FF6040;--green:#1AFF98;--dark:#0C0C18;--dark2:#111122;--white:#F9F7F2;--muted:rgba(255,255,255,.45);--border:rgba(255,255,255,.08);--fd:'Syne',sans-serif;--fb:'DM Mono',monospace;--fi:'Fraunces',serif}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--dark);color:var(--white);min-height:100vh}
.topnav{position:sticky;top:0;z-index:100;background:rgba(12,12,24,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:58px}
.logo{display:flex;align-items:center;gap:9px}
.lmark{width:30px;height:30px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:13px;color:#fff}
.ltext{font-family:var(--fd);font-size:16px;font-weight:700}.ltext strong{color:var(--red)}
.nav-acts{display:flex;align-items:center;gap:10px}
.btn-back{padding:8px 16px;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--fb);font-size:11px;cursor:pointer;background:none;transition:all .2s}
.btn-back:hover{color:var(--white);border-color:rgba(255,255,255,.25)}
.btn-new{padding:8px 16px;background:var(--red);border:none;border-radius:8px;color:#fff;font-family:var(--fd);font-size:11px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-new:hover{background:var(--red2)}
.layout{max-width:980px;margin:0 auto;padding:36px 24px 80px}
/* Score Hero */
.score-hero{background:linear-gradient(135deg,var(--dark2),#161628);border:1px solid var(--border);border-radius:18px;padding:36px;margin-bottom:24px;display:grid;grid-template-columns:auto 1fr auto;gap:36px;align-items:center}
.score-circle{width:110px;height:110px;border-radius:50%;border:3px solid var(--border);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.score-circle svg{position:absolute;inset:-3px;width:calc(100% + 6px);height:calc(100% + 6px);transform:rotate(-90deg)}
.ring{stroke:var(--red);stroke-width:3;stroke-linecap:round;fill:none;transition:stroke-dashoffset 1.5s cubic-bezier(.22,1,.36,1)}
.score-num{font-family:var(--fd);font-size:34px;font-weight:800;line-height:1;position:relative;z-index:1}
.score-lbl{font-size:10px;color:var(--muted);position:relative;z-index:1}
.score-meta h2{font-family:var(--fd);font-size:20px;font-weight:800;margin-bottom:7px}
.score-meta h2 em{font-family:var(--fi);color:var(--red);font-style:italic}
.score-meta p{font-size:12px;color:var(--muted);line-height:1.6;max-width:400px}
.score-meta .meta-date{font-size:11px;color:rgba(255,255,255,.3);margin-top:9px}
.sub-scores{display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.sub-s{text-align:center}
.sub-val{font-family:var(--fd);font-size:24px;font-weight:800}
.sub-val.g{color:var(--green)}.sub-val.r{color:var(--red)}
.sub-lbl{font-size:10px;color:var(--muted);margin-top:2px}
/* Two col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-hd{padding:16px 20px;border-bottom:1px solid var(--border);font-family:var(--fd);font-size:13px;font-weight:700}
.card-bd{padding:18px 20px}
/* Bars */
.sbar{margin-bottom:12px}
.sbar-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;color:var(--muted)}
.sbar-row span:last-child{font-family:var(--fd);font-weight:700;color:var(--white)}
.sbar-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.fg{background:var(--green)}.fr{background:var(--red)}.fy{background:#FFB400}.fb{background:#5B8EFF}
/* Feedback items */
.fb-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.fb-item{display:flex;align-items:flex-start;gap:9px;font-size:12px;line-height:1.5}
.fb-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.ic-g{background:rgba(26,255,152,.12)}.ic-r{background:rgba(224,58,10,.12)}.ic-b{background:rgba(91,142,255,.12)}
/* Q&A */
.qa-list{display:flex;flex-direction:column;gap:14px;margin-bottom:24px}
.qa-card{background:var(--dark2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.qa-card:hover{border-color:rgba(255,255,255,.13)}
.qa-hd{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;background:rgba(255,255,255,.01);transition:background .15s}
.qa-hd:hover{background:rgba(255,255,255,.03)}
.qa-qnum{width:28px;height:28px;border-radius:7px;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.qa-q{flex:1;font-family:var(--fd);font-size:13px;font-weight:600}
.qa-score{font-family:var(--fd);font-size:14px;font-weight:800}
.qa-score.h{color:var(--green)}.qa-score.m{color:#FFB400}.qa-score.l{color:var(--red)}
.qa-chev{color:var(--muted);transition:transform .2s;font-size:14px}
.qa-card.open .qa-chev{transform:rotate(180deg)}
.qa-body{display:none;padding:0 18px 16px;border-top:1px solid var(--border)}
.qa-card.open .qa-body{display:block}
.qa-sublbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:14px 0 7px}
.qa-ans{font-size:12px;line-height:1.6;color:rgba(255,255,255,.72)}
.qa-fb{font-size:12px;line-height:1.6;color:rgba(255,255,255,.58);background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:11px}
/* Tips */
.tips-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.tip-card{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:18px}
.tip-icon{font-size:22px;margin-bottom:9px}
.tip-title{font-family:var(--fd);font-size:13px;font-weight:700;margin-bottom:5px}
.tip-txt{font-size:11px;color:var(--muted);line-height:1.5}
/* CTA */
.cta-band{background:linear-gradient(135deg,rgba(224,58,10,.12),rgba(224,58,10,.04));border:1px solid rgba(224,58,10,.22);border-radius:14px;padding:32px;text-align:center}
.cta-band h2{font-family:var(--fd);font-size:22px;font-weight:800;margin-bottom:8px}
.cta-band h2 em{font-family:var(--fi);color:var(--red);font-style:italic}
.cta-band p{font-size:12px;color:var(--muted);margin-bottom:20px}
.cta-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--red);border:none;border-radius:9px;color:#fff;font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 5px 20px rgba(224,58,10,.3);transition:all .2s}
.cta-btn:hover{background:var(--red2);transform:translateY(-2px)}
/* Loading */
@keyframes spin{to{transform:rotate(360deg)}}
.loader{width:30px;height:30px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
@media(max-width:768px){.score-hero{grid-template-columns:1fr;text-align:center}.sub-scores{flex-direction:row;justify-content:center}.two-col{grid-template-columns:1fr}.tips-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.tips-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="topnav">
  <div class="logo"><div class="lmark">P</div><span class="ltext">Prep<strong>Wise</strong> — Report</span></div>
  <div class="nav-acts">
    <button class="btn-back" onclick="location.href='/dashboard'">← Dashboard</button>
    <button class="btn-new" onclick="location.href='/dashboard'">Practice Again →</button>
  </div>
</nav>

<div class="layout" id="layout">
  <div class="loader"></div>
</div>

<script>
const token = localStorage.getItem('pw_token');
if (!token) location.href = '/login';
const H = { headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token } };
const params = new URLSearchParams(location.search);
const ivId   = params.get('id');
if (!ivId) location.href = '/dashboard';

async function loadReport() {
  try {
    const r = await fetch(`/api/interview/${ivId}`, H);
    const { interview: iv } = await r.json();
    if (!iv) throw new Error('Not found');
    render(iv);
  } catch {
    document.getElementById('layout').innerHTML = `<div style="text-align:center;padding:60px;color:var(--muted)">Could not load report. <a href="/dashboard" style="color:var(--red)">Go to Dashboard</a></div>`;
  }
}

function render(iv) {
  const layout = document.getElementById('layout');
  const a      = iv.analysis || {};
  const overall = iv.overallScore || 0;
  const circum  = Math.PI * 2 * 50;
  const dash    = circum - (circum * overall / 100);
  const role    = (iv.role||'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const type    = (iv.interviewType||'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const date    = new Date(iv.completedAt||iv.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

  layout.innerHTML = `
    <!-- Score Hero -->
    <div class="score-hero">
      <div class="score-circle">
        <svg viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="50" stroke="rgba(255,255,255,.06)" stroke-width="3" fill="none"/>
          <circle class="ring" cx="55" cy="55" r="50" stroke-dasharray="${circum}" stroke-dashoffset="${circum}" id="ring"/>
        </svg>
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-lbl">Overall</div>
      </div>
      <div class="score-meta">
        <h2>${role} <em>${type}</em> Interview</h2>
        <p>${iv.aiFeedbackSummary || 'Great effort! Review your breakdown below.'}</p>
        <div class="meta-date">${date} · ${iv.durationMin||0} min · ${iv.questions?.length||0} questions</div>
      </div>
      <div class="sub-scores">
        <div class="sub-s"><div class="sub-val g">${iv.verbalScore||0}</div><div class="sub-lbl">Verbal</div></div>
        <div class="sub-s"><div class="sub-val r">${iv.nonVerbalScore||0}</div><div class="sub-lbl">Non-Verbal</div></div>
      </div>
    </div>

    <!-- Analysis + Feedback -->
    <div class="two-col">
      <div class="card">
        <div class="card-hd">📊 Performance Breakdown</div>
        <div class="card-bd">
          ${bar('Confidence', a.confidence||0, 'fg')}
          ${bar('Eye Contact', a.eyeContact||0, 'fr')}
          ${bar('Posture', a.posture||0, 'fb')}
          ${bar('Clarity', a.clarity||0, 'fy')}
          ${bar('Pacing', a.pacing||0, 'fg')}
          ${bar('Nervousness', a.nervousness||0, 'fy')}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="card">
          <div class="card-hd">✅ Strengths</div>
          <div class="card-bd">
            <ul class="fb-list">
              ${(iv.keyStrengths||['Keep practising!']).map(s=>`<li class="fb-item"><div class="fb-icon ic-g">✓</div><span>${s}</span></li>`).join('')}
            </ul>
          </div>
        </div>
        <div class="card">
          <div class="card-hd">🎯 Areas to Improve</div>
          <div class="card-bd">
            <ul class="fb-list">
              ${(iv.areasToImprove||['Keep going!']).map(s=>`<li class="fb-item"><div class="fb-icon ic-r">→</div><span>${s}</span></li>`).join('')}
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Q&A Breakdown -->
    <div style="font-family:var(--fd);font-size:18px;font-weight:800;margin-bottom:16px">Question by Question <em style="font-family:var(--fi);color:var(--red);font-style:italic">Breakdown</em></div>
    <div class="qa-list">
      ${(iv.questions||[]).map((q,i) => {
        const s = q.aiScore||0, cls = s>=75?'h':s>=50?'m':'l';
        return `<div class="qa-card" id="qa${i}">
          <div class="qa-hd" onclick="toggleQA(${i})">
            <div class="qa-qnum">${i+1}</div>
            <div class="qa-q">${q.text}</div>
            <div class="qa-score ${cls}">${s}/100</div>
            <div class="qa-chev">▾</div>
          </div>
          <div class="qa-body">
            <div class="qa-sublbl">Your Answer</div>
            <div class="qa-ans">${q.answer||'<em style="color:var(--muted)">No answer recorded</em>'}</div>
            ${q.aiFeedback?`<div class="qa-sublbl">AI Feedback</div><div class="qa-fb">${q.aiFeedback}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Tips -->
    <div style="font-family:var(--fd);font-size:18px;font-weight:800;margin-bottom:16px">Actionable <em style="font-family:var(--fi);color:var(--red);font-style:italic">Tips</em></div>
    <div class="tips-grid">
      ${(iv.tips||['Keep practising!','Review your answers','Focus on STAR method']).map((t,i)=>`
        <div class="tip-card">
          <div class="tip-icon">${['🎯','💡','🚀','📈','🧠','⚡'][i]||'💡'}</div>
          <div class="tip-title">Tip ${i+1}</div>
          <div class="tip-txt">${t}</div>
        </div>`).join('')}
    </div>

    <!-- CTA -->
    <div class="cta-band">
      <h2>Ready for <em>round 2?</em></h2>
      <p>Every session improves your score. Start another practice now.</p>
      <button class="cta-btn" onclick="location.href='/dashboard'">
        Start Next Interview
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 11.5L11.5 1.5M11.5 1.5H5M11.5 1.5V8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
    </div>
  `;

  // Animate score circle
  setTimeout(() => {
    document.getElementById('ring').style.strokeDashoffset = dash;
    let n=0; const iv2 = setInterval(()=>{ n=Math.min(overall,n+2); document.getElementById('scoreNum').textContent=n; if(n>=overall) clearInterval(iv2); },18);
    // Animate bars
    document.querySelectorAll('.sbar-fill').forEach(el => {
      const w = el.dataset.w; if(w){el.style.width='0%';setTimeout(()=>el.style.width=w+'%',100);}
    });
  }, 100);
}

function bar(label, val, cls) {
  const v = Math.round(val);
  return `<div class="sbar">
    <div class="sbar-row"><span>${label}</span><span>${v}%</span></div>
    <div class="sbar-track"><div class="sbar-fill ${cls}" data-w="${v}" style="width:0%"></div></div>
  </div>`;
}

function toggleQA(i) { document.getElementById('qa'+i).classList.toggle('open'); }

loadReport();
</script>
</body>
</html>
